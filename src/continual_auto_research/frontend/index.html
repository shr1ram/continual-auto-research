<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>continual-auto-research</title>
  <style>
    :root { --green:#245A40; --gold:#C5A55A; --terra:#B85C4A; --cream:#FBF8F1;
            --ink:#1d241f; --muted:#6b736c; --line:#e7e2d6; }
    * { box-sizing: border-box; }
    body { font-family: ui-sans-serif, system-ui, sans-serif; background: var(--cream);
           color: var(--ink); margin: 0; }
    header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--line);
             display:flex; align-items:baseline; gap:1rem; }
    h1 { color: var(--green); font-size: 1.25rem; margin: 0; }
    .sub { color: var(--muted); font-size: .85rem; }
    .app { display: grid; grid-template-columns: 240px 1fr; min-height: calc(100vh - 60px); }
    /* sidebar: run list */
    aside { border-right: 1px solid var(--line); padding: 1rem; overflow:auto; }
    aside h2 { font-size: .8rem; text-transform: uppercase; letter-spacing:.05em;
               color: var(--muted); margin: 0 0 .5rem; }
    .run-item { padding:.5rem .6rem; border-radius:6px; cursor:pointer; font-size:.85rem;
                border:1px solid transparent; margin-bottom:.25rem; }
    .run-item:hover { background:#fff; }
    .run-item.active { background:#fff; border-color: var(--green); }
    .run-item .rid { font-weight:600; }
    .run-item .meta { color: var(--muted); font-size:.75rem; }
    .badge { display:inline-block; padding:.05rem .4rem; border-radius:999px; font-size:.7rem; }
    .badge.running { background: var(--gold); color:#3a2f12; }
    .badge.done { background: var(--green); color:#fff; }
    .badge.failed { background: var(--terra); color:#fff; }
    /* main */
    main { padding: 1.25rem 1.5rem; overflow:auto; }
    .panel { background:#fff; border:1px solid var(--line); border-radius:10px;
             padding:1rem 1.25rem; margin-bottom:1.25rem; }
    .row { display:flex; gap:1.5rem; flex-wrap:wrap; align-items:flex-end; }
    label { display:block; font-size:.75rem; color: var(--muted); margin-bottom:.2rem; }
    input, select { padding:.4rem .5rem; border:1px solid var(--line); border-radius:6px;
                    font-size:.9rem; background:#fff; }
    input[type=number]{ width: 90px; }
    button { background: var(--green); color:#fff; border:0; border-radius:6px;
             padding:.55rem 1.1rem; font-size:.9rem; cursor:pointer; }
    button.secondary { background:#fff; color: var(--ink); border:1px solid var(--line); }
    button:disabled { opacity:.5; cursor:default; }
    .best { font-size:1.8rem; font-weight:700; color: var(--green); }
    .stat { display:flex; gap:2rem; align-items:baseline; }
    .light { display:inline-flex; align-items:center; gap:.35rem; font-size:.8rem; margin-right:1rem; }
    .dot { width:9px; height:9px; border-radius:50%; background:#ccc; }
    .dot.on { background: var(--green); } .dot.off { background: var(--terra); }
    table { border-collapse: collapse; width:100%; font-size:.85rem; }
    th,td { text-align:left; padding:.4rem .6rem; border-bottom:1px solid var(--line); }
    tr.accepted td { background: rgba(36,90,64,.07); }
    tr.failed td { color: var(--terra); }
    tr.cand { cursor: pointer; }
    .raw { font-family: ui-monospace, monospace; font-size:.78rem; white-space:pre-wrap;
           color:#444; background: var(--cream); padding:.5rem; border-radius:6px;
           max-height:280px; overflow:auto; }
    .tsec { margin:.4rem 0; }
    .tlabel { font-size:.7rem; font-weight:700; letter-spacing:.04em; margin-bottom:.2rem; }
    .tlabel.sys { color:#6b736c; } .tlabel.prompt { color: var(--green); }
    .tlabel.resp { color: var(--gold); } .tlabel.cmd { color:#555; }
    .tlabel.out { color: var(--terra); }
    svg { display:block; }
    .pill { display:inline-block; padding:.05rem .45rem; border-radius:999px; font-size:.72rem; }
    .pill.acc { background: var(--green); color:#fff; } .pill.rej { background: var(--line); color:#555; }
    .plateau { height:6px; background: var(--line); border-radius:3px; overflow:hidden; width:160px; }
    .plateau > i { display:block; height:100%; background: var(--gold); }
  </style>
</head>
<body>
  <header>
    <h1>continual-auto-research</h1>
    <span class="sub">hill-climbing optimiser · live</span>
  </header>

  <div class="app">
    <aside>
      <h2>Runs</h2>
      <div id="runList"></div>
    </aside>

    <main>
      <!-- launch form -->
      <div class="panel">
        <div style="margin-bottom:.75rem">
          <label>Objective / prompt — what to optimise</label>
          <textarea id="objective" rows="3" style="width:100%; padding:.5rem .6rem;
            border:1px solid var(--line); border-radius:6px; font-size:.9rem;
            font-family: inherit; resize:vertical;"
            placeholder="Describe what to optimise…"></textarea>
        </div>
        <div class="row">
          <div><label>Direction</label>
            <select id="direction"><option value="min">min</option><option value="max">max</option></select></div>
          <div><label>Max iters</label><input id="maxIter" type="number" value="20" min="1"></div>
          <div><label>Patience</label><input id="patience" type="number" value="4" min="1"></div>
          <div><label>Target (optional)</label><input id="target" type="number" step="any" placeholder="—"></div>
          <div><label>Runner</label>
            <select id="runner"><option value="demo">demo</option><option value="broker">broker (GPU)</option></select></div>
          <div><label>Proposer</label>
            <select id="proposer">
              <option value="demo">demo</option>
              <option value="claude">claude -p</option>
              <option value="api">api</option>
              <option value="ollama">ollama (local)</option>
            </select></div>
          <div><label>Model</label><input id="model" placeholder="(proposer model)"></div>
          <button id="launch">Launch run</button>
        </div>
        <div style="margin-top:.75rem" id="lights"></div>
        <!-- broker fields (shown only for broker runner) -->
        <div class="row" id="brokerFields" style="display:none; margin-top:.5rem">
          <div><label>project_id</label><input id="projectId"></div>
          <div><label>workspace_dir</label><input id="workspaceDir" size="30"></div>
          <div><label>run_command</label><input id="runCommand" size="36"></div>
        </div>
      </div>

      <!-- current run -->
      <div class="panel">
        <div class="stat">
          <div>best <span class="best" id="best">—</span></div>
          <div><label>status</label><span id="status">idle</span></div>
          <div><label>plateau</label><div class="plateau"><i id="plateau" style="width:0"></i></div></div>
          <div style="margin-left:auto">
            <button id="resume" class="secondary" disabled>Resume +10</button>
            <button id="stop" class="secondary" disabled>Stop</button>
          </div>
        </div>
        <svg id="chart" width="100%" height="180" viewBox="0 0 600 180" preserveAspectRatio="none"></svg>
      </div>

      <!-- candidate table -->
      <div class="panel">
        <table>
          <thead><tr><th>iter</th><th>score</th><th>best</th><th>trace</th><th>proposal</th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="/static/pipeline-controller.js"></script>
</body>
</html>
